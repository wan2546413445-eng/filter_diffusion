seed: 42
device: cuda

data:
  train_root: /mnt/SSD/wsy/data/train
  val_root: /mnt/SSD/wsy/data/val
  test_root: /mnt/SSD/wsy/data/test
  seed: 42
  image_size: 256
  num_workers: 4
  num_skip_slice: 10
  normalize_mode: img_std

  mask_type: equispaced_cartesian
  R: 4
  center_fraction: 0.08
  patch_size: 1

model:
  backbone: swin_dits
  patch_size: 4
  hidden_size: 384
  depth: 8
  num_heads: 8
  window_size: 8
  mlp_ratio: 4.0
  residual: False

training:
  timesteps: 19
  loss_type: l1
  batch_size: 12
  lr: 1e-4
  train_num_steps: 200000
  gradient_accumulate_every: 1
  fp16: False
  ema_decay: 0.995
  step_start_ema: 2000
  update_ema_every: 10
  save_and_sample_every: 2000
  results_folder: ./results_ixi_dense
  lr_scheduler_type: cosine
  warmup_steps: 2000
  min_lr: 1e-6
  filter_schedule_type: dense
  center_core_size: 13
  use_explicit_dc: True

  val_every: 2000
  max_val_batches: 50
  early_stop_patience: 10000
  early_stop_min_delta: 0.0000001
  monitor_metric: psnr
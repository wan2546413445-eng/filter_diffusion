seed: 42
device: cuda

data:
  train_root: /mnt/SSD/wsy/data/train
  val_root: /mnt/SSD/wsy/data/val
  test_root: /mnt/SSD/wsy/data/test

  image_size: 256
  num_workers: 4
  num_skip_slice: 20
  normalize_mode: percentile

  mask_type: equispace_diffusion
  R: 4
  center_fraction: 0.08
  patch_size: 1

model:
  backbone: swin_dits
  residual: False

  patch_size: 4
  hidden_size: 384
  depth: 8
  num_heads: 8
  window_size: 8
  mlp_ratio: 4.0

training:
  timesteps: 20
  loss_type: l1
  batch_size: 2
  lr: 5e-5
  train_num_steps: 50000
  gradient_accumulate_every: 2
  fp16: False

  ema_decay: 0.995
  step_start_ema: 500
  update_ema_every: 10
  save_and_sample_every: 1000
  results_folder: ./results_ixi_swin

  filter_schedule_type: dense
  center_core_size: 20
  use_explicit_dc: True

  val_every: 500
  early_stop_patience: 12
  early_stop_min_delta: 0.002
  monitor_metric: psnr